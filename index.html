<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Gitleaks — Custom Viewer</title>
    <style>
        :root {
            --bg: #0b1220;
            --panel: #0f1724;
            --muted: #98a0ad;
            --text: #e6eef8;
            --accent: #3b82f6;
            --border: #1f2937;
            --th-bg: #111827;
            --row-hover: #0e1722;
            --code-bg: #081018;
            --test: #ff0000;
        }

        html, body {
            height: 100%;
            margin: 0;
            background: linear-gradient(180deg,var(--bg),#07101a 120%);
            color: var(--text);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding: 24px;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
        }

        .controls {
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
        }

        input[type="file"] {
            color: var(--muted);
            background: transparent;
            border: 0;
            padding: 0;
            margin: 0;
        }

        button {
            background: var(--accent);
            color: white;
            border: 0;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 1px 0 rgba(0,0,0,0.25);
            font-weight: 600;
        }

            button:active {
                transform: translateY(1px);
            }

            button[disabled] {
                opacity: .5;
                cursor: not-allowed;
            }

        #summary {
            color: var(--muted);
            font-size: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            background: transparent;
            color: var(--text);
        }

        th, td {
            border: 1px solid var(--border);
            padding: 10px 12px;
            text-align: left;
            vertical-align: top;
            font-size: 13px;
        }

        thead th {
            background: var(--th-bg);
            color: var(--text);
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 2;
        }

        tbody tr {
            background: transparent;
        }

            tbody tr:nth-child(odd) td {
                background: rgba(255,255,255,0.01);
            }

            tbody tr:hover td {
                background: var(--row-hover);
            }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Courier New", monospace;
            background: var(--code-bg);
            padding: 8px;
            border-radius: 6px;
            color: var(--text);
            font-size: 12px;
        }

        code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Courier New", monospace;
            background: var(--code-bg);
            padding: 4px 6px;
            border-radius: 4px;
            color: var(--text);
            font-size: 12px;
        }

        a:link {
            color: var(--accent);
            text-decoration: underline;
        }

        a:visited {
            color: #69e03c;
        }

        .hidden {
            display: none;
        }

        .errors {
            color: #ffb4b4;
            margin-top: 8px;
            background: rgba(255, 20, 20, 0.04);
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255,20,20,0.08);
            font-size: 13px;
        }

        .lineFilterDiv {
            padding: 0px;
            margin-block: auto 2px;
        }

        /* small screens */
        @media (max-width:900px) {
            th, td {
                font-size: 12px;
                padding: 8px;
            }

            pre {
                font-size: 11px;
                padding: 6px;
            }

            label {
                font-size: 13px;
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>Gitleaks JSON — Table view</h1>

        <section class="controls">
            <label>
                Choose JSON files
                <input id="fileInput" type="file" accept=".json,application/json" multiple />
            </label>
            <button id="clearBtn" type="button">Clear</button>
            <div id="summary">No files loaded</div>
        </section>

        <section id="tableSection" class="hidden" aria-live="polite">
            <table id="resultsTable" aria-label="Gitleaks results">
                <thead>
                    <tr>
                        <th>RuleId
                        <div id="ruleIdFilter" style="position:relative; display:inline-block;"></div>
                        </th>
                        <th>Description</th>
                        <th>Secret</th>
                        <th>Line
                        <div class="lineFilterDiv"><input id="lineFilter" placeholder="Filter Line by regex" /></div>
                        </th>
                        <th>Date</th>
                        <th>Message</th>
                        <th>Meta</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <section id="errors" class="errors" aria-live="polite"></section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
